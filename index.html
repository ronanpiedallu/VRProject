<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>AR OS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<video
id="camera"
autoplay
playsinline
muted>
</video>

<div id="ar-layer">

    <div class="window" id="clock">
        <div class="title">Horloge</div>
        <div id="clockText"></div>
    </div>

    <div class="window" id="notes">
        <div class="title">Notes</div>

        <textarea>

Bienvenue dans AR OS

        </textarea>

    </div>

    <div class="window" id="videoWindow">

        <div class="title">
            Vidéo
        </div>

        <video
        autoplay
        loop
        muted>

            <source
            src="assets/demo.mp4">

        </video>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
